<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Upload — The Halliday Brief</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1612;
    --soil: #2d1f0e;
    --wheat: #c9a84c;
    --cream: #faf6ee;
    --muted: #6b5e4e;
    --green: #1f5c2e;
    --red: #8b2020;
  }

  body {
    background: #ddd5c0;
    font-family: 'Source Serif 4', Georgia, serif;
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 16px;
  }

  .container {
    max-width: 600px;
    width: 100%;
    background: var(--cream);
    border: 1px solid #bfad90;
    box-shadow: 6px 8px 48px rgba(0,0,0,0.22);
    padding: 48px;
  }

  .title {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 900;
    color: var(--soil);
    margin-bottom: 4px;
  }
  .subtitle {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 32px;
  }

  /* Auth section */
  .auth-section {
    text-align: center;
    padding: 40px 0;
  }
  .auth-section.hidden { display: none; }

  .login-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.06em;
    background: var(--soil);
    color: var(--cream);
    border: none;
    padding: 14px 32px;
    cursor: pointer;
    transition: background 0.2s;
    text-decoration: none;
  }
  .login-btn:hover { background: #4a3520; }
  .login-btn svg { width: 20px; height: 20px; fill: var(--cream); }

  .auth-hint {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-top: 16px;
    letter-spacing: 0.06em;
  }

  /* Logged in header */
  .user-bar {
    display: none;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid #e0d8c8;
  }
  .user-bar.visible { display: flex; }

  .user-info {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--green);
    letter-spacing: 0.06em;
  }

  .btn {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 10px 24px;
    border: none;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-primary {
    background: var(--soil);
    color: var(--cream);
  }
  .btn-primary:hover { background: #4a3520; }
  .btn-small {
    background: none;
    border: 1px solid #bfad90;
    color: var(--muted);
    padding: 6px 14px;
    font-size: 10px;
  }
  .btn-small:hover { background: #f5f0e8; }

  /* Drop zone */
  .upload-area { display: none; }
  .upload-area.visible { display: block; }

  .drop-zone {
    border: 2.5px dashed #bfad90;
    padding: 60px 32px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 24px;
    position: relative;
  }
  .drop-zone:hover, .drop-zone.dragover {
    border-color: var(--wheat);
    background: rgba(201,168,76,0.08);
  }

  .drop-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
  }

  .drop-icon {
    font-size: 48px;
    margin-bottom: 16px;
    color: var(--wheat);
  }
  .drop-text {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--soil);
    margin-bottom: 8px;
  }
  .drop-hint {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* Preview */
  .preview {
    display: none;
    margin-bottom: 24px;
    padding: 20px;
    background: #f5f0e8;
    border-left: 4px solid var(--wheat);
  }
  .preview.visible { display: block; }

  .preview-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .preview-row {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--ink);
    margin-bottom: 6px;
  }
  .preview-row span { color: var(--muted); }

  /* Status */
  .status {
    display: none;
    padding: 16px 20px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    margin-bottom: 16px;
  }
  .status.visible { display: block; }
  .status.uploading { background: #f0dfa0; color: var(--soil); }
  .status.success { background: #d4edda; color: var(--green); }
  .status.error { background: #f5d5d5; color: var(--red); }

  .publish-btn {
    width: 100%;
    padding: 16px;
    font-size: 14px;
    display: none;
  }
  .publish-btn.visible { display: block; }

  .back-link {
    display: block;
    text-align: center;
    margin-top: 24px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-decoration: none;
    letter-spacing: 0.08em;
  }
  .back-link:hover { color: var(--soil); }
</style>
</head>
<body>

<div class="container">
  <div class="title">Publish a Newsletter</div>
  <div class="subtitle">The Halliday Brief</div>

  <!-- Login prompt (shown when not authenticated) -->
  <div class="auth-section" id="auth-section">
    <a class="login-btn" id="login-btn" href="#">
      <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
      Login with GitHub
    </a>
    <div class="auth-hint">Only the account owner can publish.</div>
  </div>

  <!-- User bar (shown when authenticated) -->
  <div class="user-bar" id="user-bar">
    <div class="user-info" id="user-info"></div>
    <button class="btn btn-small" onclick="logout()">Log out</button>
  </div>

  <!-- Upload area (shown when authenticated) -->
  <div class="upload-area" id="upload-area">
    <div class="drop-zone" id="drop-zone">
      <input type="file" accept=".html" id="file-input" />
      <div class="drop-icon">&#8681;</div>
      <div class="drop-text">Drop newsletter HTML here</div>
      <div class="drop-hint">or click to browse</div>
    </div>

    <div class="preview" id="preview">
      <div class="preview-label">Ready to publish</div>
      <div class="preview-row" id="preview-file"><span>File:</span> —</div>
      <div class="preview-row" id="preview-title"><span>Title:</span> —</div>
      <div class="preview-row" id="preview-date"><span>Date:</span> —</div>
      <div class="preview-row" id="preview-headline"><span>Lead:</span> —</div>
    </div>

    <div class="status" id="status"></div>

    <button class="btn btn-primary publish-btn" id="publish-btn" onclick="publish()">Publish Newsletter</button>
  </div>

  <a class="back-link" href="./">&#8592; Back to The Halliday Brief</a>
</div>

<script>
  // ════════════════════════════════════════
  // CONFIGURATION — UPDATE THIS AFTER SETUP
  // ════════════════════════════════════════
  var WORKER_URL = 'https://halliday-auth.doson.workers.dev';
  var REPO_OWNER = 'drvonhalliday';
  var REPO_NAME = 'halliday-brief';

  var pendingFile = null;

  // ── Auth ──
  function getToken() {
    return localStorage.getItem('hb_oauth_token') || '';
  }

  function checkForToken() {
    // Check URL fragment for token from OAuth callback
    var hash = window.location.hash;
    if (hash.indexOf('#token=') === 0) {
      var token = hash.substring(7);
      localStorage.setItem('hb_oauth_token', token);
      // Clean the URL
      history.replaceState(null, '', window.location.pathname);
      return token;
    }
    return getToken();
  }

  function logout() {
    localStorage.removeItem('hb_oauth_token');
    updateUI();
  }

  function updateUI() {
    var token = getToken();
    var authSection = document.getElementById('auth-section');
    var userBar = document.getElementById('user-bar');
    var uploadArea = document.getElementById('upload-area');

    if (token) {
      // Verify token is still valid
      fetch('https://api.github.com/user', {
        headers: { 'Authorization': 'Bearer ' + token, 'User-Agent': 'HallidayBrief' }
      })
      .then(function(res) {
        if (!res.ok) throw new Error('Token expired');
        return res.json();
      })
      .then(function(user) {
        if (user.login !== REPO_OWNER) {
          logout();
          showStatus('Access denied. Only the account owner can publish.', 'error');
          return;
        }
        authSection.classList.add('hidden');
        userBar.classList.add('visible');
        uploadArea.classList.add('visible');
        document.getElementById('user-info').innerHTML = 'Logged in as <strong>' + user.login + '</strong>';
      })
      .catch(function() {
        // Token is invalid, clear it
        localStorage.removeItem('hb_oauth_token');
        authSection.classList.remove('hidden');
        userBar.classList.remove('visible');
        uploadArea.classList.remove('visible');
      });
    } else {
      authSection.classList.remove('hidden');
      userBar.classList.remove('visible');
      uploadArea.classList.remove('visible');
    }
  }

  // ── File handling ──
  function parseNewsletter(content) {
    var titleMatch = content.match(/<title>(.*?)<\/title>/i);
    if (!titleMatch) return null;

    var rawTitle = titleMatch[1].trim();
    var parts = rawTitle.split('|').map(function(p) { return p.trim(); });

    var vol = parts[1] || 'Unknown';
    var dateStr = parts[2] || 'Unknown';

    var filename = null;
    var dateMatch = dateStr.match(/(\w+)\s+(\d{1,2}),?\s+(\d{4})/);
    if (dateMatch) {
      var months = {
        'january':'01','february':'02','march':'03','april':'04',
        'may':'05','june':'06','july':'07','august':'08',
        'september':'09','october':'10','november':'11','december':'12'
      };
      var m = months[dateMatch[1].toLowerCase()];
      var d = dateMatch[2].padStart(2, '0');
      var y = dateMatch[3];
      if (m) filename = y + '-' + m + '-' + d + '.html';
    }

    var h2Match = content.match(/<h2>([\s\S]*?)<\/h2>/i);
    var headline = '';
    if (h2Match) {
      headline = h2Match[1].replace(/<[^>]+>/g, '').trim();
    }

    return {
      vol: vol,
      date: dateStr,
      headline: headline,
      filename: filename || ('newsletter-' + Date.now() + '.html')
    };
  }

  function handleFile(file) {
    if (!file || !file.name.endsWith('.html')) {
      showStatus('Please upload an HTML file', 'error');
      return;
    }

    var reader = new FileReader();
    reader.onload = function(e) {
      var content = e.target.result;
      var meta = parseNewsletter(content);

      if (!meta) {
        showStatus('Could not parse newsletter. Make sure the HTML has a <title> tag with the standard format.', 'error');
        return;
      }

      pendingFile = { name: meta.filename, content: content };

      document.getElementById('preview-file').innerHTML = '<span>File:</span> ' + meta.filename;
      document.getElementById('preview-title').innerHTML = '<span>Title:</span> ' + meta.vol;
      document.getElementById('preview-date').innerHTML = '<span>Date:</span> ' + meta.date;
      document.getElementById('preview-headline').innerHTML = '<span>Lead:</span> ' + meta.headline;
      document.getElementById('preview').classList.add('visible');
      document.getElementById('publish-btn').classList.add('visible');
      hideStatus();
    };
    reader.readAsText(file);
  }

  // ── Drag and drop ──
  var dropZone = document.getElementById('drop-zone');
  var fileInput = document.getElementById('file-input');

  dropZone.addEventListener('dragover', function(e) {
    e.preventDefault();
    dropZone.classList.add('dragover');
  });
  dropZone.addEventListener('dragleave', function() {
    dropZone.classList.remove('dragover');
  });
  dropZone.addEventListener('drop', function(e) {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener('change', function() {
    if (fileInput.files.length > 0) handleFile(fileInput.files[0]);
  });

  // ── Publish ──
  function publish() {
    if (!pendingFile || !getToken()) return;

    var btn = document.getElementById('publish-btn');
    btn.disabled = true;
    btn.textContent = 'Publishing...';
    showStatus('Uploading to GitHub...', 'uploading');

    var path = 'newsletters/' + pendingFile.name;
    var content = btoa(unescape(encodeURIComponent(pendingFile.content)));

    fetch('https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME + '/contents/' + path, {
      headers: { 'Authorization': 'Bearer ' + getToken() }
    })
    .then(function(res) {
      if (res.ok) {
        return res.json().then(function(data) {
          return commitFile(path, content, data.sha);
        });
      } else {
        return commitFile(path, content, null);
      }
    })
    .then(function() {
      showStatus('Published! The newsletter will be live in about 2 minutes.', 'success');
      btn.textContent = 'Published';
      pendingFile = null;
      setTimeout(function() {
        document.getElementById('preview').classList.remove('visible');
        btn.classList.remove('visible');
        btn.disabled = false;
        btn.textContent = 'Publish Newsletter';
        fileInput.value = '';
      }, 5000);
    })
    .catch(function(err) {
      showStatus('Error: ' + err.message, 'error');
      btn.disabled = false;
      btn.textContent = 'Publish Newsletter';
    });
  }

  function commitFile(path, content, sha) {
    var body = { message: 'Publish ' + pendingFile.name, content: content };
    if (sha) body.sha = sha;

    return fetch('https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME + '/contents/' + path, {
      method: 'PUT',
      headers: {
        'Authorization': 'Bearer ' + getToken(),
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    }).then(function(res) {
      if (!res.ok) {
        return res.json().then(function(data) {
          throw new Error(data.message || 'Upload failed');
        });
      }
    });
  }

  // ── Status ──
  function showStatus(msg, type) {
    var el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'status visible ' + type;
  }
  function hideStatus() {
    document.getElementById('status').className = 'status';
  }

  // ── Init ──
  // Set login URL
  document.getElementById('login-btn').href = WORKER_URL + '/auth/login';

  // Check for OAuth callback token
  checkForToken();
  updateUI();
</script>

</body>
</html>
