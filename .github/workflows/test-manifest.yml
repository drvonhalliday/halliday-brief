name: Test Newsletter Manifest

on:
  push:
    paths:
      - 'test-newsletters/**'

permissions:
  contents: write

jobs:
  test-manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Build test-newsletters.json from HTML files
        run: |
          python3 << 'SCRIPT'
          import os, re, json, html

          newsletters_dir = 'test-newsletters'
          if not os.path.isdir(newsletters_dir):
              print('No test-newsletters directory')
              with open('test-newsletters.json', 'w') as f:
                  json.dump([], f)
              exit(0)

          entries = []
          for filename in sorted(os.listdir(newsletters_dir)):
              if not filename.endswith('.html'):
                  continue

              filepath = os.path.join(newsletters_dir, filename)
              with open(filepath, 'r', encoding='utf-8') as f:
                  content = f.read(2000)

              title_match = re.search(r'<title>(.*?)</title>', content, re.IGNORECASE)
              if not title_match:
                  continue

              raw_title = html.unescape(title_match.group(1).strip())
              parts = [p.strip() for p in raw_title.split('|')]

              vol = parts[1] if len(parts) > 1 else filename.replace('.html', '')
              date_str = parts[2] if len(parts) > 2 else filename.replace('.html', '')

              h2_match = re.search(r'<h2>(.*?)</h2>', content, re.IGNORECASE | re.DOTALL)
              headline = ''
              if h2_match:
                  headline = re.sub(r'<[^>]+>', '', h2_match.group(1)).strip()

              entries.append({
                  'file': filename,
                  'title': vol,
                  'date': date_str,
                  'headline': headline
              })

          entries.sort(key=lambda e: e['file'])

          with open('test-newsletters.json', 'w', encoding='utf-8') as f:
              json.dump(entries, f, indent=2, ensure_ascii=False)
              f.write('\n')

          print('Updated test-newsletters.json with ' + str(len(entries)) + ' entries')
          for e in entries:
              print('  - ' + e['file'] + ': ' + e['title'] + ' / ' + e['date'])
          SCRIPT

      - name: Commit updated test manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add test-newsletters.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update test newsletter manifest"
            git push
          fi

