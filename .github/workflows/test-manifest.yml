name: Test Newsletter Manifest

on:
  push:
    paths:
      - 'test-newsletters/**'

permissions:
  contents: write

jobs:
  test-manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Build test-newsletters.json from HTML files
        run: |
          python3 << 'SCRIPT'
          import os, re, json, html

          newsletters_dir = 'test-newsletters'
          if not os.path.isdir(newsletters_dir):
              print('No test-newsletters directory')
              with open('test-newsletters.json', 'w') as f:
                  json.dump([], f)
              exit(0)

          entries = []
          for filename in sorted(os.listdir(newsletters_dir)):
              if not filename.endswith('.html'):
                  continue

              filepath = os.path.join(newsletters_dir, filename)
              with open(filepath, 'r', encoding='utf-8') as f:
                  content = f.read(2000)

              title_match = re.search(r'<title>(.*?)</title>', content, re.IGNORECASE)
              if not title_match:
                  continue

              raw_title = html.unescape(title_match.group(1).strip())
              parts = [p.strip() for p in raw_title.split('|')]

              vol = parts[1] if len(parts) > 1 else filename.replace('.html', '')
              date_str = parts[2] if len(parts) > 2 else filename.replace('.html', '')

              h2_match = re.search(r'<h2>(.*?)</h2>', content, re.IGNORECASE | re.DOTALL)
              headline = ''
              if h2_match:
                  headline = re.sub(r'<[^>]+>', '', h2_match.group(1)).strip()

              entries.append({
                  'file': filename,
                  'title': vol,
                  'date': date_str,
                  'headline': headline
              })

          entries.sort(key=lambda e: e['file'])

          with open('test-newsletters.json', 'w', encoding='utf-8') as f:
              json.dump(entries, f, indent=2, ensure_ascii=False)
              f.write('\n')

          print('Updated test-newsletters.json with ' + str(len(entries)) + ' entries')
          for e in entries:
              print('  - ' + e['file'] + ': ' + e['title'] + ' / ' + e['date'])
          SCRIPT

      - name: Detect new test newsletter
        id: detect
        run: |
          ADDED=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'test-newsletters/*.html' 2>/dev/null || echo "")
          if [ -n "$ADDED" ]; then
            echo "file=$ADDED" >> $GITHUB_OUTPUT
            echo "New test newsletter detected: $ADDED"
          else
            echo "file=" >> $GITHUB_OUTPUT
            echo "No new test newsletter (deletion or update)"
          fi

      - name: Commit updated test manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add test-newsletters.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update test newsletter manifest"
            git push
          fi

      - name: Install email tools
        if: steps.detect.outputs.file != ''
        run: pip install css-inline beautifulsoup4

      - name: Create draft email in Buttondown
        if: steps.detect.outputs.file != ''
        env:
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
          NEWSLETTER_FILE: ${{ steps.detect.outputs.file }}
        run: |
          python3 << 'SCRIPT'
          import os, re, json, html
          import urllib.request
          import css_inline
          from bs4 import BeautifulSoup

          filepath = os.environ.get('NEWSLETTER_FILE', '')
          if not filepath:
              files = sorted(f for f in os.listdir('test-newsletters') if f.endswith('.html'))
              if not files:
                  print('No test newsletters found')
                  exit(0)
              filepath = 'test-newsletters/' + files[-1]

          with open(filepath, 'r', encoding='utf-8') as f:
              content = f.read()

          title_match = re.search(r'<title>(.*?)</title>', content[:2000], re.IGNORECASE)
          if not title_match:
              print('No title found, skipping')
              exit(0)

          raw_title = html.unescape(title_match.group(1).strip())
          parts = [p.strip() for p in raw_title.split('|')]
          subject = '[TEST] The Halliday Brief'
          if len(parts) >= 3:
              subject = '[TEST] ' + parts[0] + ' \u2014 ' + parts[2]

          # Resolve CSS variables
          css_vars = {
              'var(--ink)': '#1a1612',
              'var(--soil)': '#2d1f0e',
              'var(--wheat)': '#c9a84c',
              'var(--wheat-light)': '#f0dfa0',
              'var(--cream)': '#faf6ee',
              'var(--off-white)': '#f5f0e8',
              'var(--muted)': '#6b5e4e',
              'var(--red)': '#8b2020',
              'var(--blue)': '#1a3a5c',
              'var(--green)': '#1f5c2e',
          }
          email_html = content
          for var, val in css_vars.items():
              email_html = email_html.replace(var, val)

          # Inline CSS
          email_html = css_inline.inline(email_html)

          soup = BeautifulSoup(email_html, 'html.parser')

          # ── Step 0: Strip event handlers and expand collapsed sections ──
          import re as _re
          for el in soup.find_all(True):
              for attr in list(el.attrs):
                  if _re.match(r'^on[a-z]', attr, _re.IGNORECASE):
                      del el[attr]
              style_val = el.get('style', '')
              if 'display:none' in style_val.replace(' ', '').lower() or 'display: none' in style_val.lower():
                  el['style'] = _re.sub(r'display\s*:\s*none', 'display:block', style_val, flags=_re.IGNORECASE)

          # ── Step 1: Propagate inherited CSS to all elements ──
          # This makes every element carry its own color/font explicitly,
          # so DOM restructuring never loses inherited styles.
          INHERITED = ['color', 'font-family', 'font-size', 'font-weight',
                       'font-style', 'letter-spacing', 'text-transform',
                       'line-height', 'text-align']
          TEXT_TAGS = {'p', 'span', 'div', 'td', 'th', 'li', 'a', 'strong', 'em',
                       'h1', 'h2', 'h3', 'h4', 'h5', 'h6', 'cite', 'small', 'label',
                       'header', 'footer', 'main', 'article', 'section', 'ul', 'ol',
                       'button', 'figcaption', 'blockquote'}

          def parse_style(s):
              if not s:
                  return {}
              d = {}
              for part in s.split(';'):
                  part = part.strip()
                  if ':' in part:
                      k, v = part.split(':', 1)
                      d[k.strip().lower()] = v.strip()
              return d

          def to_style_str(d):
              return '; '.join(k + ': ' + v for k, v in d.items() if v)

          def propagate(el, inherited):
              if not hasattr(el, 'attrs'):
                  return
              own = parse_style(el.get('style', ''))
              effective = dict(inherited)
              for prop in INHERITED:
                  if prop in own:
                      effective[prop] = own[prop]
              if el.name in TEXT_TAGS:
                  changed = False
                  for prop in INHERITED:
                      if prop in effective and prop not in own:
                          own[prop] = effective[prop]
                          changed = True
                  if changed:
                      el['style'] = to_style_str(own)
              for child in el.children:
                  propagate(child, effective)

          root = soup.find('body') or soup
          propagate(root, {})

          # ── Step 2: Flatten grid/flex layouts for email ──
          # Replace display:grid and display:flex with block stacking.
          # Email clients don't support grid or flexbox.
          for el in soup.find_all(True):
              style = parse_style(el.get('style', ''))
              display = style.get('display', '')
              if 'grid' in display or 'flex' in display:
                  style['display'] = 'block'
                  style.pop('grid-template-columns', None)
                  style.pop('flex-direction', None)
                  style.pop('flex-wrap', None)
                  style.pop('align-items', None)
                  style.pop('justify-content', None)
                  style.pop('gap', None)
                  el['style'] = to_style_str(style)

          # ── Step 3: Fix specific layout patterns ──
          # Numbers row: ensure cells stack with breathing room
          for row in soup.find_all('div', class_='numbers-row'):
              style = parse_style(row.get('style', ''))
              style['display'] = 'block'
              style.pop('grid-template-columns', None)
              style.pop('gap', None)
              style['border'] = '1px solid #c8b890'
              style['margin'] = '28px 0'
              row['style'] = to_style_str(style)
              for cell in row.find_all('div', class_='number-cell'):
                  cs = parse_style(cell.get('style', ''))
                  cs['display'] = 'block'
                  cs['padding'] = '20px 24px'
                  cs['text-align'] = 'center'
                  cs['border-bottom'] = '1px solid #c8b890'
                  cell['style'] = to_style_str(cs)

          # Footer grid: stack columns vertically
          for grid in soup.find_all('div', class_='footer-grid'):
              style = parse_style(grid.get('style', ''))
              style['display'] = 'block'
              style.pop('grid-template-columns', None)
              style.pop('gap', None)
              grid['style'] = to_style_str(style)
              for col in grid.find_all('div', class_='footer-col'):
                  cs = parse_style(col.get('style', ''))
                  cs['display'] = 'block'
                  cs['margin-bottom'] = '24px'
                  col['style'] = to_style_str(cs)

          # Footer bottom: stack brand and fine print
          for fb in soup.find_all('div', class_='footer-bottom'):
              style = parse_style(fb.get('style', ''))
              style['display'] = 'block'
              style.pop('justify-content', None)
              style.pop('align-items', None)
              fb['style'] = to_style_str(style)

          # Masthead meta: stack spans with spacing
          for meta in soup.find_all('div', class_='masthead-meta'):
              style = parse_style(meta.get('style', ''))
              style['display'] = 'block'
              style['text-align'] = 'center'
              style.pop('gap', None)
              meta['style'] = to_style_str(style)
              for span in meta.find_all('span'):
                  ss = parse_style(span.get('style', ''))
                  ss['display'] = 'inline-block'
                  ss['padding'] = '0 12px'
                  span['style'] = to_style_str(ss)

          # This-week items: ensure block display
          for ul in soup.find_all('ul', class_='this-week-items'):
              for li in ul.find_all('li'):
                  ls = parse_style(li.get('style', ''))
                  ls['display'] = 'block'
                  ls['margin-bottom'] = '11px'
                  li['style'] = to_style_str(ls)
                  for span in li.find_all('span'):
                      ss = parse_style(span.get('style', ''))
                      ss['display'] = 'inline'
                      span['style'] = to_style_str(ss)

          # Section headers: stack tag and rule
          for sh in soup.find_all('div', class_='section-header'):
              style = parse_style(sh.get('style', ''))
              style['display'] = 'block'
              style.pop('gap', None)
              sh['style'] = to_style_str(style)

          # Watch list items: ensure block stacking
          for wl in soup.find_all('ul', class_='watch-list'):
              for li in wl.find_all('li'):
                  ls = parse_style(li.get('style', ''))
                  ls['display'] = 'block'
                  li['style'] = to_style_str(ls)

          # Ornament dividers: simplify to centered text
          for orn in soup.find_all('div', class_='ornament'):
              style = parse_style(orn.get('style', ''))
              style['display'] = 'block'
              style['text-align'] = 'center'
              style.pop('gap', None)
              orn['style'] = to_style_str(style)
              for line in orn.find_all('div', class_='ornament-line'):
                  line['style'] = 'display: inline-block; width: 30%; height: 1px; background: #d0c4a8; vertical-align: middle;'
              for sym in orn.find_all('div', class_='ornament-symbol'):
                  ss = parse_style(sym.get('style', ''))
                  ss['display'] = 'inline-block'
                  ss['vertical-align'] = 'middle'
                  ss['padding'] = '0 12px'
                  sym['style'] = to_style_str(ss)

          # Inject unsubscribe link before closing </footer>
          footer = soup.find('footer')
          if footer:
              unsub_div = soup.new_tag('div')
              unsub_div['style'] = 'text-align:center; padding:20px 0 0; margin-top:16px; border-top:1px solid #3a5a3e;'
              unsub_link = soup.new_tag('a', href='{{ unsubscribe_url }}')
              unsub_link['style'] = 'font-family:\"Space Mono\",monospace; font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:#7a9a7e; text-decoration:none;'
              unsub_link.string = 'Unsubscribe'
              unsub_div.append(unsub_link)
              footer.append(unsub_div)

          email_html = str(soup)

          body_html = email_html

          # Create as DRAFT — does not send to subscribers
          payload = json.dumps({
              'subject': subject,
              'body': body_html,
              'status': 'draft',
              'template': ''
          }).encode('utf-8')

          api_key = os.environ['BUTTONDOWN_API_KEY']
          req = urllib.request.Request(
              'https://api.buttondown.com/v1/emails',
              data=payload,
              headers={
                  'Authorization': 'Token ' + api_key,
                  'Content-Type': 'application/json',
              },
              method='POST'
          )

          try:
              resp = urllib.request.urlopen(req)
              print('Draft created successfully: ' + str(resp.status))
              print('Check Buttondown dashboard > Emails > Drafts to preview')
          except urllib.error.HTTPError as e:
              body = e.read().decode('utf-8')
              print('Buttondown API error ' + str(e.code) + ': ' + body)
              if e.code >= 500:
                  exit(1)
          SCRIPT
