name: Update Newsletter Manifest

on:
  push:
    paths:
      - 'newsletters/**'

permissions:
  contents: write

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Build newsletters.json and rss.xml from HTML files
        run: |
          python3 << 'SCRIPT'
          import os, re, json, html
          from datetime import datetime, timezone
          from email.utils import format_datetime

          SITE_URL = 'https://brief.vonhalliday.com'
          newsletters_dir = 'newsletters'
          entries = []

          for filename in sorted(os.listdir(newsletters_dir)):
              if not filename.endswith('.html'):
                  continue

              filepath = os.path.join(newsletters_dir, filename)
              with open(filepath, 'r', encoding='utf-8') as f:
                  full_content = f.read()

              title_match = re.search(r'<title>(.*?)</title>', full_content[:2000], re.IGNORECASE)
              if not title_match:
                  continue

              raw_title = html.unescape(title_match.group(1).strip())
              parts = [p.strip() for p in raw_title.split('|')]

              vol = parts[1] if len(parts) > 1 else filename.replace('.html', '')
              date_str = parts[2] if len(parts) > 2 else filename.replace('.html', '')

              h2_match = re.search(r'<h2>(.*?)</h2>', full_content[:4000], re.IGNORECASE | re.DOTALL)
              headline = ''
              if h2_match:
                  headline = re.sub(r'<[^>]+>', '', h2_match.group(1)).strip()

              pub_date = None
              date_match = re.match(r'(\d{4})-(\d{2})-(\d{2})', filename)
              if date_match:
                  pub_date = datetime(
                      int(date_match.group(1)),
                      int(date_match.group(2)),
                      int(date_match.group(3)),
                      12, 0, 0,
                      tzinfo=timezone.utc
                  )

              entries.append({
                  'file': filename,
                  'title': vol,
                  'date': date_str,
                  'headline': headline,
                  'full_content': full_content,
                  'pub_date': pub_date
              })

          entries.sort(key=lambda e: e['file'])

          json_entries = [
              {'file': e['file'], 'title': e['title'], 'date': e['date'], 'headline': e['headline']}
              for e in entries
          ]
          with open('newsletters.json', 'w', encoding='utf-8') as f:
              json.dump(json_entries, f, indent=2, ensure_ascii=False)
              f.write('\n')

          def xml_escape(text):
              return text.replace('&', '&amp;').replace('<', '&lt;').replace('>', '&gt;').replace('"', '&quot;')

          now = format_datetime(datetime.now(timezone.utc))
          items = []
          for e in reversed(entries):
              link = SITE_URL + '/newsletters/' + e['file']
              title = xml_escape('The Halliday Brief \u2014 ' + e['title'] + ' \u2014 ' + e['date'])
              desc = xml_escape(e['headline']) if e['headline'] else title
              pub = format_datetime(e['pub_date']) if e['pub_date'] else now
              content_cdata = e['full_content']
              item = '    <item>\n'
              item += '      <title>' + title + '</title>\n'
              item += '      <link>' + link + '</link>\n'
              item += '      <guid isPermaLink="true">' + link + '</guid>\n'
              item += '      <pubDate>' + pub + '</pubDate>\n'
              item += '      <description>' + desc + '</description>\n'
              item += '      <content:encoded><![CDATA[' + content_cdata + ']]></content:encoded>\n'
              item += '    </item>'
              items.append(item)

          rss_parts = []
          rss_parts.append('<?xml version="1.0" encoding="UTF-8"?>')
          rss_parts.append('<rss version="2.0" xmlns:content="http://purl.org/rss/1.0/modules/content/" xmlns:atom="http://www.w3.org/2005/Atom">')
          rss_parts.append('  <channel>')
          rss_parts.append('    <title>The Halliday Brief</title>')
          rss_parts.append('    <link>' + SITE_URL + '</link>')
          rss_parts.append('    <description>Strategic insights from Von Halliday Consulting</description>')
          rss_parts.append('    <language>en-us</language>')
          rss_parts.append('    <lastBuildDate>' + now + '</lastBuildDate>')
          rss_parts.append('    <atom:link href="' + SITE_URL + '/rss.xml" rel="self" type="application/rss+xml"/>')
          for item in items:
              rss_parts.append(item)
          rss_parts.append('  </channel>')
          rss_parts.append('</rss>')
          rss_parts.append('')

          with open('rss.xml', 'w', encoding='utf-8') as f:
              f.write('\n'.join(rss_parts))

          print('Updated newsletters.json with ' + str(len(entries)) + ' entries')
          print('Updated rss.xml with ' + str(len(entries)) + ' items')
          for e in entries:
              print('  - ' + e['file'] + ': ' + e['title'] + ' / ' + e['date'])
          SCRIPT

      - name: Detect new newsletter
        id: detect
        run: |
          ADDED=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'newsletters/*.html' 2>/dev/null || echo "")
          if [ -n "$ADDED" ]; then
            echo "file=$ADDED" >> $GITHUB_OUTPUT
            echo "New newsletter detected: $ADDED"
          else
            echo "file=" >> $GITHUB_OUTPUT
            echo "No new newsletter (deletion or update)"
          fi

      - name: Commit updated manifest and feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add newsletters.json rss.xml
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update newsletter manifest and RSS feed"
            git push
          fi

      - name: Install email tools
        if: steps.detect.outputs.file != ''
        run: pip install css-inline beautifulsoup4

      - name: Send email via Buttondown
        if: steps.detect.outputs.file != ''
        env:
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
          NEWSLETTER_FILE: ${{ steps.detect.outputs.file }}
        run: |
          python3 << 'SCRIPT'
          import os, re, json, html
          import urllib.request
          import css_inline
          from bs4 import BeautifulSoup

          filepath = os.environ.get('NEWSLETTER_FILE', '')
          if not filepath:
              files = sorted(f for f in os.listdir('newsletters') if f.endswith('.html'))
              if not files:
                  print('No newsletters found')
                  exit(0)
              filepath = 'newsletters/' + files[-1]

          with open(filepath, 'r', encoding='utf-8') as f:
              content = f.read()

          title_match = re.search(r'<title>(.*?)</title>', content[:2000], re.IGNORECASE)
          if not title_match:
              print('No title found, skipping email')
              exit(0)

          raw_title = html.unescape(title_match.group(1).strip())
          parts = [p.strip() for p in raw_title.split('|')]
          subject = 'The Halliday Brief'
          if len(parts) >= 3:
              subject = parts[0] + ' \u2014 ' + parts[2]

          # Resolve CSS variables
          css_vars = {
              'var(--ink)': '#1a1612',
              'var(--soil)': '#2d1f0e',
              'var(--wheat)': '#c9a84c',
              'var(--wheat-light)': '#f0dfa0',
              'var(--cream)': '#faf6ee',
              'var(--off-white)': '#f5f0e8',
              'var(--muted)': '#6b5e4e',
              'var(--red)': '#8b2020',
              'var(--blue)': '#1a3a5c',
              'var(--green)': '#1f5c2e',
          }
          email_html = content
          for var, val in css_vars.items():
              email_html = email_html.replace(var, val)

          # Inline CSS first
          email_html = css_inline.inline(email_html)

          # Convert grid/flex layouts to tables for email compatibility
          soup = BeautifulSoup(email_html, 'html.parser')

          # Convert .numbers-row (3-col grid) to table
          for row in soup.find_all('div', class_='numbers-row'):
              cells = row.find_all('div', class_='number-cell')
              if not cells:
                  continue
              table = soup.new_tag('table', attrs={
                  'width': '100%',
                  'cellpadding': '0',
                  'cellspacing': '0',
                  'border': '0',
                  'style': 'border: 1px solid #c8b890; margin: 28px 0;'
              })
              tr = soup.new_tag('tr')
              for cell in cells:
                  td = soup.new_tag('td', attrs={
                      'width': '33%',
                      'align': 'center',
                      'valign': 'top',
                      'style': 'background: #f5f0e8; padding: 24px 18px; text-align: center; border-right: 1px solid #c8b890;'
                  })
                  td.append(cell)
                  tr.append(td)
              table.append(tr)
              row.replace_with(table)

          # Convert .footer-grid (2-col) to table
          for grid in soup.find_all('div', class_='footer-grid'):
              cols = grid.find_all('div', class_='footer-col')
              if not cols:
                  continue
              table = soup.new_tag('table', attrs={
                  'width': '100%',
                  'cellpadding': '0',
                  'cellspacing': '0',
                  'border': '0',
                  'style': 'margin-bottom: 28px;'
              })
              tr = soup.new_tag('tr')
              for col in cols:
                  td = soup.new_tag('td', attrs={
                      'width': '50%',
                      'valign': 'top',
                      'style': 'padding: 0 20px 0 0;'
                  })
                  td.append(col)
                  tr.append(td)
              table.append(tr)
              grid.replace_with(table)

          # Convert .masthead-meta flex to table
          for meta in soup.find_all('div', class_='masthead-meta'):
              spans = meta.find_all('span')
              if not spans:
                  continue
              table = soup.new_tag('table', attrs={
                  'width': '100%',
                  'cellpadding': '0',
                  'cellspacing': '0',
                  'border': '0',
              })
              tr = soup.new_tag('tr')
              for span in spans:
                  td = soup.new_tag('td', attrs={
                      'align': 'center',
                      'style': span.get('style', '') + '; padding: 0 16px;'
                  })
                  td.string = span.get_text()
                  tr.append(td)
              table.append(tr)
              meta.replace_with(table)

          # Convert .this-week-items flex list to stacked divs
          for ul in soup.find_all('ul', class_='this-week-items'):
              for li in ul.find_all('li'):
                  existing = li.get('style', '')
                  li['style'] = existing + '; display: block; margin-bottom: 11px;'

          # Convert .footer-bottom flex to table
          for fb in soup.find_all('div', class_='footer-bottom'):
              children = list(fb.children)
              real_children = [c for c in children if getattr(c, 'name', None)]
              if len(real_children) >= 2:
                  table = soup.new_tag('table', attrs={
                      'width': '100%',
                      'cellpadding': '0',
                      'cellspacing': '0',
                      'border': '0',
                      'style': 'border-top: 1px solid #4a3520; padding-top: 22px;'
                  })
                  tr = soup.new_tag('tr')
                  td1 = soup.new_tag('td', attrs={'align': 'left', 'valign': 'middle'})
                  td1.append(real_children[0].extract())
                  td2 = soup.new_tag('td', attrs={'align': 'right', 'valign': 'middle'})
                  td2.append(real_children[1].extract())
                  tr.append(td1)
                  tr.append(td2)
                  table.append(tr)
                  fb.replace_with(table)

          # Convert .section-header flex to table
          for sh in soup.find_all('div', class_='section-header'):
              children = [c for c in sh.children if getattr(c, 'name', None)]
              if len(children) >= 2:
                  table = soup.new_tag('table', attrs={
                      'width': '100%',
                      'cellpadding': '0',
                      'cellspacing': '0',
                      'border': '0',
                      'style': 'margin-bottom: 30px; margin-top: 52px;'
                  })
                  tr = soup.new_tag('tr')
                  td1 = soup.new_tag('td', attrs={'valign': 'middle', 'style': 'padding-right: 16px;'})
                  td1.append(children[0].extract())
                  td2 = soup.new_tag('td', attrs={'valign': 'middle', 'width': '100%'})
                  td2.append(children[1].extract())
                  tr.append(td1)
                  tr.append(td2)
                  table.append(tr)
                  sh.replace_with(table)

          # Convert .watch-list li flex to table rows
          for wl in soup.find_all('ul', class_='watch-list'):
              for li in wl.find_all('li'):
                  children = [c for c in li.children if getattr(c, 'name', None)]
                  if len(children) >= 2:
                      table = soup.new_tag('table', attrs={
                          'width': '100%',
                          'cellpadding': '0',
                          'cellspacing': '0',
                          'border': '0',
                          'style': 'border-bottom: 1px dashed #c8b890; padding: 18px 0;'
                      })
                      tr = soup.new_tag('tr')
                      td1 = soup.new_tag('td', attrs={
                          'valign': 'top',
                          'width': '50',
                          'style': 'padding-right: 18px;'
                      })
                      td1.append(children[0].extract())
                      td2 = soup.new_tag('td', attrs={'valign': 'top'})
                      td2.append(children[1].extract())
                      tr.append(td1)
                      tr.append(td2)
                      table.append(tr)
                      li.replace_with(table)

          # Convert .ornament flex to table
          for orn in soup.find_all('div', class_='ornament'):
              children = [c for c in orn.children if getattr(c, 'name', None)]
              if len(children) >= 3:
                  table = soup.new_tag('table', attrs={
                      'width': '100%',
                      'cellpadding': '0',
                      'cellspacing': '0',
                      'border': '0',
                      'style': 'margin: 44px 0;'
                  })
                  tr = soup.new_tag('tr')
                  td1 = soup.new_tag('td', attrs={'style': 'height: 1px; background: #d0c4a8;'})
                  td1.string = '\u00a0'
                  td2 = soup.new_tag('td', attrs={
                      'align': 'center',
                      'style': 'padding: 0 16px; font-family: Playfair Display, serif; font-size: 22px; color: #c9a84c;'
                  })
                  td2.string = children[1].get_text()
                  td3 = soup.new_tag('td', attrs={'style': 'height: 1px; background: #d0c4a8;'})
                  td3.string = '\u00a0'
                  tr.append(td1)
                  tr.append(td2)
                  tr.append(td3)
                  table.append(tr)
                  orn.replace_with(table)

          email_html = str(soup)

          body_html = '<!-- buttondown-editor-mode: fancy -->\n' + email_html

          payload = json.dumps({
              'subject': subject,
              'body': body_html,
              'status': 'about_to_send'
          }).encode('utf-8')

          api_key = os.environ['BUTTONDOWN_API_KEY']
          req = urllib.request.Request(
              'https://api.buttondown.com/v1/emails',
              data=payload,
              headers={
                  'Authorization': 'Token ' + api_key,
                  'Content-Type': 'application/json',
                  'X-Buttondown-Live-Dangerously': 'true'
              },
              method='POST'
          )

          try:
              resp = urllib.request.urlopen(req)
              print('Email sent successfully: ' + str(resp.status))
          except urllib.error.HTTPError as e:
              body = e.read().decode('utf-8')
              print('Buttondown API error ' + str(e.code) + ': ' + body)
              if e.code >= 500:
                  exit(1)
          SCRIPT
