<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Halliday Brief — Von Halliday Consulting</title>
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />

<!-- Open Graph (LinkedIn, Facebook, etc.) -->
<meta property="og:title" content="The Halliday Brief" />
<meta property="og:description" content="Rural health policy newsletter from Von Halliday Consulting — North Dakota" />
<meta property="og:image" content="https://brief.vonhalliday.com/og-image.png" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="627" />
<meta property="og:url" content="https://brief.vonhalliday.com" />
<meta property="og:type" content="website" />

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="The Halliday Brief" />
<meta name="twitter:description" content="Rural health policy newsletter from Von Halliday Consulting — North Dakota" />
<meta name="twitter:image" content="https://brief.vonhalliday.com/og-image.png" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;1,8..60,300;1,8..60,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1612;
    --soil: #2d1f0e;
    --wheat: #c9a84c;
    --wheat-light: #f0dfa0;
    --cream: #faf6ee;
    --off-white: #f5f0e8;
    --muted: #6b5e4e;
  }

  body {
    background: #ddd5c0;
    font-family: 'Source Serif 4', Georgia, serif;
    color: var(--ink);
    min-height: 100vh;
    padding: 40px 16px;
  }

  .site-wrapper {
    max-width: 860px;
    margin: 0 auto;
  }


  /* ── NAV BAR ── */
  .nav-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 32px;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .nav-arrows {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .nav-btn {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: var(--soil);
    color: var(--cream);
    border: none;
    padding: 10px 20px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .nav-btn:hover { background: #4a3520; }
  .nav-btn:disabled {
    background: #b0a690;
    cursor: default;
    color: #ddd5c0;
  }

  .archive-btn {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: none;
    border: 1.5px solid var(--soil);
    color: var(--soil);
    padding: 10px 20px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .archive-btn:hover {
    background: var(--soil);
    color: var(--cream);
  }

  /* ── SHARE BAR ── */
  .nav-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .share-bar {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .share-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-right: 2px;
  }
  .share-btn {
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: none;
    border: 1.5px solid var(--soil);
    color: var(--soil);
    cursor: pointer;
    transition: all 0.2s;
    padding: 0;
  }
  .share-btn:hover {
    background: var(--soil);
    color: var(--cream);
  }
  .share-btn svg {
    width: 15px;
    height: 15px;
    fill: currentColor;
    flex-shrink: 0;
  }
  .share-btn.copied {
    background: var(--soil);
    color: var(--wheat);
    border-color: var(--soil);
  }
  #share-native-btn { display: none; }

  /* ── NEWSLETTER FRAME ── */
  .newsletter-wrap {
    position: relative;
  }

  .newsletter-frame {
    width: 100%;
    border: 1px solid #bfad90;
    box-shadow: 6px 8px 48px rgba(0,0,0,0.22), 0 0 0 7px #faf6ee, 0 0 0 8px #bfad90;
    background: var(--cream);
    min-height: 100vh;
    opacity: 0;
    transition: opacity 0.5s ease;
  }

  .newsletter-frame.loaded {
    opacity: 1;
  }

  .newsletter-loading {
    position: absolute;
    inset: 0;
    background: #ddd5c0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    z-index: 1;
    transition: opacity 0.5s ease;
  }

  .newsletter-loading.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .loading-spinner {
    width: 32px;
    height: 32px;
    border: 2px solid #bfad90;
    border-top-color: var(--wheat);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  .loading-text {
    font-family: 'Playfair Display', serif;
    font-size: 0.9rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* ── ARCHIVE PANEL ── */
  .archive-panel {
    display: none;
    background: var(--cream);
    border: 1px solid #bfad90;
    box-shadow: 6px 8px 48px rgba(0,0,0,0.22), 0 0 0 7px #faf6ee, 0 0 0 8px #bfad90;
    padding: 48px 56px;
    margin-bottom: 24px;
  }
  .archive-panel.open { display: block; }

  .archive-title {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 900;
    color: var(--soil);
    margin-bottom: 8px;
  }
  .archive-sub {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 32px;
  }

  .archive-list {
    list-style: none;
  }
  .archive-item {
    display: flex;
    align-items: baseline;
    gap: 20px;
    padding: 16px 0;
    border-bottom: 1px solid #e0d8c8;
    cursor: pointer;
    transition: background 0.15s;
  }
  .archive-item:hover { background: var(--off-white); }
  .archive-item.active {
    border-left: 4px solid var(--wheat);
    padding-left: 16px;
  }

  .archive-date {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--muted);
    flex-shrink: 0;
    width: 130px;
  }
  .archive-issue-title {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--soil);
    line-height: 1.3;
  }
  .archive-vol {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.08em;
    margin-top: 4px;
  }

  /* ── SUBSCRIBE ── */
  .subscribe-bar {
    background: var(--soil);
    border: 1px solid #bfad90;
    box-shadow: 6px 8px 48px rgba(0,0,0,0.22), 0 0 0 7px #faf6ee, 0 0 0 8px #bfad90;
    padding: 32px 48px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }

  .subscribe-text {
    flex: 1;
    min-width: 200px;
  }

  .subscribe-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--cream);
    margin-bottom: 4px;
  }

  .subscribe-hint {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #a08c68;
  }

  .subscribe-form {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }

  .subscribe-input {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    padding: 10px 14px;
    border: 1px solid #5a4a32;
    background: #3d2e18;
    color: var(--cream);
    outline: none;
    width: 220px;
    transition: border-color 0.2s;
  }
  .subscribe-input::placeholder { color: #7a6545; }
  .subscribe-input:focus { border-color: var(--wheat); }

  .subscribe-btn {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: var(--wheat);
    color: var(--soil);
    border: none;
    padding: 10px 20px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .subscribe-btn:hover { background: #d4b45a; }

  .subscribe-success {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--wheat);
    letter-spacing: 0.06em;
    display: none;
  }

  /* ── FOOTER ── */
  .site-footer {
    text-align: center;
    padding: 32px 16px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: #7a6545;
    text-transform: uppercase;
  }

  @media (max-width: 640px) {
    body { padding: 20px 8px; }
    .nav-bar { flex-direction: column; align-items: stretch; }
    .nav-arrows { justify-content: center; }
    .archive-panel { padding: 28px 20px; }
    .archive-item { flex-direction: column; gap: 4px; }
    .archive-date { width: auto; }
    .subscribe-bar { flex-direction: column; text-align: center; padding: 28px 20px; }
    .subscribe-form { width: 100%; }
    .subscribe-input { flex: 1; width: auto; }
    .nav-right { flex-direction: column; align-items: stretch; }
    .share-bar { justify-content: center; }
  }
</style>
</head>
<body>

<div class="site-wrapper">

  <!-- SUBSCRIBE -->
  <div class="subscribe-bar">
    <div class="subscribe-text">
      <div class="subscribe-title">Get it in your inbox</div>
      <div class="subscribe-hint">New issues delivered weekly</div>
    </div>
    <form class="subscribe-form" id="subscribe-form" action="https://buttondown.com/api/emails/embed-subscribe/drvonhalliday" method="post" target="_blank">
      <input class="subscribe-input" type="email" name="email" placeholder="your@email.com" required />
      <button class="subscribe-btn" type="submit">Subscribe</button>
    </form>
    <div class="subscribe-success" id="subscribe-success">Check your email to confirm.</div>
  </div>

  <!-- NEWSLETTER -->
  <div class="newsletter-wrap">
    <div class="newsletter-loading" id="newsletter-loading">
      <div class="loading-spinner"></div>
    </div>
    <iframe class="newsletter-frame" id="newsletter-frame" frameborder="0" scrolling="no"></iframe>
  </div>

  <!-- NAV -->
  <div class="nav-bar">
    <div class="nav-arrows">
      <button class="nav-btn" id="prev-btn" onclick="navigate(-1)">&#8592; Older</button>
      <button class="nav-btn" id="next-btn" onclick="navigate(1)">Newer &#8594;</button>
    </div>
    <div class="nav-right">
      <div class="share-bar" id="share-bar">
        <span class="share-label">Share</span>
        <button class="share-btn" id="share-copy" onclick="doShare('copy')" title="Copy link">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M16 1H4a2 2 0 0 0-2 2v14h2V3h12V1zm3 4H8a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2zm0 16H8V7h11v14z"/></svg>
        </button>
        <button class="share-btn" onclick="doShare('linkedin')" title="Share on LinkedIn">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
        </button>
        <button class="share-btn" onclick="doShare('facebook')" title="Share on Facebook">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
        </button>
        <button class="share-btn" onclick="doShare('x')" title="Share on X">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.737-8.857L1.254 2.25H8.08l4.259 5.631 5.905-5.631zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        </button>
      </div>
      <button class="archive-btn" id="share-native-btn" onclick="doNativeShare()">Share</button>
      <button class="archive-btn" id="archive-toggle" onclick="toggleArchive()">Archive</button>
    </div>
  </div>

  <!-- ARCHIVE PANEL -->
  <div class="archive-panel" id="archive-panel">
    <div class="archive-title">Archive</div>
    <div class="archive-sub">All issues of The Halliday Brief</div>
    <ul class="archive-list" id="archive-list"></ul>
  </div>

</div>

<div class="site-footer">
  &copy; 2026 Von Halliday Consulting &middot; North Dakota &middot; Published Weekly
</div>

<script>
  let issues = [];
  let currentIndex = 0;

  // Auto-resize iframe to fit content
  function resizeFrame() {
    const frame = document.getElementById('newsletter-frame');
    try {
      const body = frame.contentDocument.body;
      const html = frame.contentDocument.documentElement;
      const height = Math.max(
        body.scrollHeight, body.offsetHeight,
        html.scrollHeight, html.offsetHeight
      );
      frame.style.height = height + 'px';
    } catch (e) {
      frame.style.height = '2000px';
    }
  }

  function loadIssue(index) {
    currentIndex = index;
    const issue = issues[index];
    const frame = document.getElementById('newsletter-frame');

    frame.onload = function() {
      document.getElementById('newsletter-loading').classList.add('hidden');
      frame.classList.add('loaded');
      resizeFrame();
      setTimeout(resizeFrame, 500);
      setTimeout(resizeFrame, 1500);
      // Open all links in new tab
      try {
        var base = frame.contentDocument.createElement('base');
        base.target = '_blank';
        frame.contentDocument.head.appendChild(base);
      } catch(e) {}
    };
    frame.src = 'newsletters/' + issue.file;

    document.getElementById('prev-btn').disabled = (index >= issues.length - 1);
    document.getElementById('next-btn').disabled = (index <= 0);

    // Update archive active state
    document.querySelectorAll('.archive-item').forEach(function(item, i) {
      item.classList.toggle('active', i === index);
    });
  }

  function navigate(direction) {
    // direction: -1 = older, +1 = newer
    // issues[0] is newest, issues[last] is oldest
    var newIndex = currentIndex - direction;
    if (newIndex >= 0 && newIndex < issues.length) {
      loadIssue(newIndex);
    }
  }

  function toggleArchive() {
    var panel = document.getElementById('archive-panel');
    panel.classList.toggle('open');
    document.getElementById('archive-toggle').textContent =
      panel.classList.contains('open') ? 'Close' : 'Archive';
  }

  function buildArchive() {
    var list = document.getElementById('archive-list');
    list.innerHTML = '';
    issues.forEach(function(issue, i) {
      var li = document.createElement('li');
      li.className = 'archive-item' + (i === currentIndex ? ' active' : '');
      li.innerHTML =
        '<div class="archive-date">' + issue.date + '</div>' +
        '<div><div class="archive-issue-title">' + issue.headline + '</div>' +
        '<div class="archive-vol">' + issue.title + '</div></div>';
      li.onclick = function() {
        loadIssue(i);
        toggleArchive();
      };
      list.appendChild(li);
    });
  }

  function getCurrentShareUrl() {
    if (!issues.length) return 'https://brief.vonhalliday.com';
    return 'https://brief.vonhalliday.com/?issue=' + issues[currentIndex].file;
  }

  function getCurrentShareTitle() {
    if (!issues.length) return 'The Halliday Brief';
    var issue = issues[currentIndex];
    return 'The Halliday Brief — ' + issue.title + (issue.date ? ' — ' + issue.date : '');
  }

  function copyShareLink(url) {
    var btn = document.getElementById('share-copy');
    navigator.clipboard.writeText(url).then(function() {
      btn.classList.add('copied');
      setTimeout(function() { btn.classList.remove('copied'); }, 2000);
    }).catch(function() {});
  }

  function doShare(platform) {
    var url = getCurrentShareUrl();
    var title = getCurrentShareTitle();
    if (platform === 'copy') {
      copyShareLink(url);
    } else if (platform === 'linkedin') {
      window.open('https://www.linkedin.com/shareArticle?mini=true&url=' + encodeURIComponent(url), '_blank');
    } else if (platform === 'facebook') {
      window.open('https://www.facebook.com/sharer/sharer.php?u=' + encodeURIComponent(url), '_blank');
    } else if (platform === 'x') {
      window.open('https://twitter.com/intent/tweet?url=' + encodeURIComponent(url) + '&text=' + encodeURIComponent(title), '_blank');
    }
  }

  function doNativeShare() {
    var url = getCurrentShareUrl();
    var title = getCurrentShareTitle();
    navigator.share({ url: url, title: title }).catch(function() {});
  }

  if (navigator.share) {
    document.getElementById('share-bar').style.display = 'none';
    document.getElementById('share-native-btn').style.display = 'inline-block';
  }

  // Load manifest and show latest; honour ?issue= param if present
  fetch('newsletters.json')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      issues = data.sort(function(a, b) {
        return b.file.localeCompare(a.file);
      });
      buildArchive();
      var params = new URLSearchParams(window.location.search);
      var requested = params.get('issue');
      var startIndex = 0;
      if (requested) {
        var idx = issues.findIndex(function(i) { return i.file === requested; });
        if (idx >= 0) startIndex = idx;
      }
      loadIssue(startIndex);
    })
    .catch(function() {
      console.error('Error loading newsletters');
    });

  // Handle window resize
  window.addEventListener('resize', resizeFrame);
</script>

</body>
</html>
